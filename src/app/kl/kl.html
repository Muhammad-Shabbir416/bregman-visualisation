<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>
      Kullback-Leibler Divergence: Binary Target Label
    </mat-card-title>
    <mat-card-subtitle>
      <span [innerHTML]="functionLatex"></span>
    </mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <app-bregman [f]="f" [fPrime]="fPrime" [id]="id" [showTangent]="showTangent" [showDivergence]="showDivergence"
      [showConvexity]="showConvexity" [showReverse]="showReverse" [x]="0.01" [x0]="0.99" [boundingBox]="boundingBox"></app-bregman>
  </mat-card-content>
  <mat-card-actions>
    <mat-slide-toggle [(ngModel)]="showTangent">Tangent</mat-slide-toggle>
    <mat-slide-toggle [(ngModel)]="showDivergence">Divergence</mat-slide-toggle>
    <mat-slide-toggle [(ngModel)]="showConvexity">Convexity</mat-slide-toggle>
    <mat-slide-toggle [(ngModel)]="showReverse"><span [innerHTML]="reverseLatex"></span></mat-slide-toggle>
  </mat-card-actions>
</mat-card>
